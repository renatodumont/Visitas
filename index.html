        // --- CORE UI ---
        function init() {
            const tabs = document.getElementById('tab-container');
            const container = document.getElementById('events-container');
            
            // Detectar dia atual para abrir aba automática
            const now = new Date();
            const todayISO = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;

            let initialIdx = schedule.findIndex(s => s.date === todayISO);
            if (initialIdx === -1) initialIdx = 0;

            schedule.forEach((day, idx) => {
                const btn = document.createElement('button');
                btn.className = `touch-target flex-1 px-4 rounded-2xl text-[10px] font-bold uppercase transition-all whitespace-nowrap ${idx === initialIdx ? 'bg-gold text-navy shadow-lg' : 'bg-navy-dark text-white/50'}`;
                btn.innerText = day.label;
                btn.onclick = () => switchTab(idx);
                tabs.appendChild(btn);

                const div = document.createElement('div');
                div.id = `day-${idx}`;
                div.className = `tab-content ${idx === initialIdx ? 'active' : ''}`;
                
                day.events.forEach(ev => {
                    const mapsUrl = getMapsLink(ev.loc);
                    div.innerHTML += `
                        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 relative w-full event-card" data-time="${ev.time}">
                            <div class="flex justify-between items-start mb-4">
                                <div class="flex items-center gap-2 text-navy"><i class="fas fa-clock text-gold text-sm"></i><span class="text-2xl font-black tracking-tight">${ev.time}</span></div>
                                <span onclick="openModal('uniformes'); event.stopPropagation();" class="uniform-badge bg-slate-50 text-slate-500 text-[10px] font-bold px-3 py-1 rounded-xl uppercase border border-slate-200">${ev.uni}</span>
                            </div>
                            <h4 class="font-extrabold text-slate-800 text-[18px] leading-tight mb-5 pr-12 text-left">${ev.title}</h4>
                            <div class="flex flex-col gap-3">
                                <a href="${mapsUrl}" target="_blank" class="touch-target text-[14px] text-blue-600 font-bold inline-flex items-center gap-2.5 bg-slate-50 rounded-2xl px-4 w-fit border border-slate-100"><i class="fas fa-location-dot text-gold"></i> ${ev.loc}</a>
                                ${ev.flight ? `<button onclick="searchFlight('${ev.flight}')" class="touch-target w-full bg-navy text-white text-xs font-bold rounded-2xl active:scale-95 transition-transform"><i class="fas fa-plane-departure text-gold mr-2"></i> RASTREAR VOO ${ev.flight}</button>` : ''}
                            </div>
                            <button onclick="showEventInfo('${ev.id}')" class="absolute top-14 right-6 text-gold p-2 active:scale-90 transition-transform"><i class="fas fa-circle-info text-3xl"></i></button>
                        </div>`;
                });
                container.appendChild(div);
            });
            updateIndicator();
            setInterval(updateIndicator, 60000);
        }

        function searchFlight(code) {
            const clean = code.replace(/\s/g, '').toUpperCase();
            window.open(`https://pt.flightaware.com/live/flight/${clean}`, '_blank');
        }

        window.showEventInfo = function(eventId) {
            let event = null;
            schedule.forEach(day => { const found = day.events.find(e => e.id === eventId); if(found) event = found; });
            if(!event) return;
            const modal = document.getElementById('info-modal');
            const body = document.getElementById('modal-body');
            document.getElementById('modal-title').innerText = "Programa de Eventos";
            
            let speakerHTML = "";
            if(event.speaker) {
                speakerHTML = `<div class="text-center font-bold mb-4 text-navy">Palestrante: ${event.speaker}</div><div class="w-full border-b border-slate-100 mb-4"></div>`;
            }

            // Lógica para transformar TUDO após os dois-pontos (":") em lista
            let finalOutputHtml = "";
            const rawDesc = event.desc || 'Informações oficiais.';
            
            if (rawDesc.includes(':')) {
                const colonIndex = rawDesc.indexOf(':');
                const label = rawDesc.substring(0, colonIndex).trim();
                const namesPart = rawDesc.substring(colonIndex + 1).trim();

                const listItems = namesPart
                    .replace(/ e /g, ',')
                    .split(',')
                    .map(name => name.trim().replace(/\.$/, ""))
                    .filter(name => name.length > 0)
                    .map(name => `<li class="ml-4 list-disc">${name}</li>`)
                    .join('');

                finalOutputHtml = `
                    <p class="font-bold mb-2 text-left">${label}:</p>
                    <ul class="space-y-1.5 text-left">
                        ${listItems}
                    </ul>
                `;
            } else {
                finalOutputHtml = `<p class="text-[15px] leading-relaxed text-slate-700 font-medium text-left">${rawDesc}</p>`;
            }

            body.innerHTML = `
                <div class="space-y-6">
                    <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm flex justify-between">
                        <div><p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Hora Local</p><span class="text-navy font-black text-lg"><i class="fas fa-clock text-gold mr-2"></i>${event.time}</span></div>
                        <div class="text-right"><p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Uniforme</p><span onclick="openModal('uniformes')" class="uniform-badge bg-navy text-white px-4 py-1.5 rounded-xl font-bold text-[11px] uppercase border border-gold/30">${event.uni}</span></div>
                    </div>
                    <div><p class="text-[11px] font-bold text-slate-400 uppercase mb-2">Atividade</p><p class="text-2xl font-extrabold text-navy leading-tight text-left">${event.title}</p></div>
                    <div class="bg-white p-6 rounded-[32px] border-l-8 border-gold shadow-sm">
                        <p class="text-[11px] font-bold text-gold uppercase mb-4 tracking-widest text-left">Observações Integrais</p>
                        ${speakerHTML}
                        <div class="text-[15px] leading-relaxed text-slate-700 font-medium text-left">
                            ${finalOutputHtml}
                        </div>
                    </div>
                </div>`;
            modal.classList.remove('hidden');
            setTimeout(() => modal.classList.add('open'), 10);
        };

        function switchTab(idx) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(`day-${idx}`).classList.add('active');
            const btns = document.getElementById('tab-container').children;
            for(let i=0; i<btns.length; i++) btns[i].className = `touch-target flex-1 px-4 rounded-2xl text-[10px] font-bold uppercase transition-all whitespace-nowrap ${i === idx ? 'bg-gold text-navy shadow-lg' : 'bg-navy-dark text-white/50'}`;
            window.scrollTo({ top: 0, behavior: 'smooth' });
            updateIndicator();
        }

        function openModal(type) {
            const m = document.getElementById('info-modal');
            const body = document.getElementById('modal-body');
            let content = "";
            if (type === 'uniformes') {
                document.getElementById('modal-title').innerText = "Manual de Uniformes";
                const unis = [{ t: "OP3", img: "op3-branco.png", d: "Uniforme Operativo Azul-Ferrete." }, { t: "Passeio", img: "Passeio.png", d: "Blazer ou paletó (sem gravata)." }, { t: "Esporte Amazônico", img: "Esporte-Amazonico.png", d: "Calça e camisa polo." }];
                unis.forEach(u => content += `<div class="bg-white p-5 rounded-[32px] border border-slate-100 mb-5 shadow-sm text-left"><p class="font-extrabold text-navy mb-4 text-xs uppercase border-b pb-2 tracking-widest">${u.t}</p><img src="${u.img}" class="w-full h-80 object-contain bg-slate-50 rounded-3xl mb-4 p-2 shadow-inner"><p class="text-[15px] text-slate-600 font-medium text-left">${u.d}</p></div>`);
            } else if (type === 'telefones') {
                document.getElementById('modal-title').innerText = "Contatos Operacionais";
                content = `<div class="bg-white rounded-[32px] border border-slate-100 overflow-hidden shadow-sm">`;
                logistics.contatos.forEach(t => {
                    if (t.superHeader) content += `<div class="bg-navy p-5 text-gold text-center font-extrabold text-xs uppercase tracking-[0.3em]">${t.superHeader}</div>`;
                    else if (t.header) content += `<div class="bg-slate-50 p-2 pl-6 text-navy font-bold text-[10px] uppercase border-y tracking-wider text-left">${t.header}</div>`;
                    else content += `<div class="p-5 border-b border-slate-50 flex justify-between items-center bg-white"><div class="flex-grow pr-4 text-left"><p class="font-bold text-base text-slate-800 uppercase leading-tight">${t.name}</p><p class="text-[11px] text-slate-400 font-bold uppercase mt-1">${t.role}</p></div><div class="flex gap-2"><a href="tel:${t.phone.replace(/\D/g,'')}" class="touch-target bg-slate-100 text-navy p-4 rounded-full w-14 h-14"><i class="fas fa-phone-alt"></i></a><a href="https://wa.me/55${t.phone.replace(/\D/g,'')}" target="_blank" class="touch-target bg-emerald-500 text-white p-4 rounded-full w-14 h-14 shadow-md"><i class="fab fa-whatsapp"></i></a></div></div>`;
                });
                content += "</div>";
            } else if (type === 'comitivas') {
                document.getElementById('modal-title').innerText = "Hóspedes e Estadia";
                logistics.hospedes.forEach(h => content += `<div class="bg-white p-6 rounded-[24px] border border-slate-100 mb-4 shadow-sm flex justify-between items-center group active:scale-[0.98] transition-transform"><div><p class="font-bold text-navy text-base uppercase leading-tight text-left">${h.n}</p><p class="text-[11px] text-slate-400 font-bold uppercase mt-1 tracking-tighter leading-tight text-left">${h.f}</p><div class="mt-4 flex items-center gap-2 text-[12px] font-bold uppercase text-gold text-left"><i class="fas fa-hotel"></i> ${h.l}</div></div><span class="bg-navy text-gold text-[10px] font-black px-2 py-4 rounded-xl uppercase tracking-widest [writing-mode:vertical-lr] border border-gold/30">${h.p}</span></div>`);
            } else if (type === 'autoridades') {
                document.getElementById('modal-title').innerText = "Informações Consolidadas";
                logistics.vtrs.forEach(v => {
                    const label = v.auth.toUpperCase().includes("COMITIVA") ? "Apoio à" : "Apoio ao";
                    content += `
                        <div class="bg-white p-6 rounded-[32px] border border-slate-100 mb-5 shadow-sm border-l-[10px] border-gold text-left">
                            <p class="text-[10px] font-extrabold text-navy/40 uppercase tracking-widest mb-1">${label}</p>
                            <p class="text-base font-extrabold text-navy uppercase mb-5">${v.auth}</p>
                            <div class="bg-slate-50 p-4 rounded-2xl mb-4 border border-slate-100">
                                <p class="text-[10px] font-bold text-gold uppercase mb-1">Local de Estadia</p>
                                <p class="text-[14px] font-bold text-slate-800 uppercase"><i class="fas fa-hotel mr-2 text-gold"></i>${v.stay}</p>
                            </div>
                            <div class="bg-navy/5 p-4 rounded-2xl mb-6 border border-navy/10">
                                <p class="text-[10px] font-bold text-navy/40 uppercase mb-2">Motorista e Viatura</p>
                                <p class="text-lg font-bold text-slate-800 uppercase underline decoration-gold/50 underline-offset-8">${v.mot}</p>
                                <div class="mt-4">
                                    <p class="text-[13px] text-navy font-bold flex items-center gap-3"><i class="fas fa-car-side"></i> ${v.model}</p>
                                    <p class="text-[13px] text-navy font-bold mt-1 pl-6.5 uppercase">Placa: ${v.plate}</p>
                                </div>
                            </div>
                            <div class="flex gap-3"><a href="tel:${v.tel.replace(/\D/g,'')}" class="touch-target flex-1 bg-navy text-white text-xs font-bold rounded-2xl shadow-sm"><i class="fas fa-phone-alt mr-2 text-gold"></i> Chamar Motorista</a></div>
                        </div>`;
                });
            } else if (type === 'motoristas') {
                document.getElementById('modal-title').innerText = "Logística de Viaturas";
                logistics.vtrs.forEach(v => {
                    const label = v.auth.toUpperCase().includes("COMITIVA") ? "Apoio à" : "Apoio ao";
                    content += `<div class="bg-white p-6 rounded-[32px] border border-slate-100 mb-5 shadow-sm border-l-[10px] border-gold text-left text-left text-left text-left"><p class="text-[10px] font-extrabold text-navy/40 uppercase tracking-widest mb-1 text-left text-left text-left text-left">${label}</p><p class="text-base font-extrabold text-navy uppercase mb-5 text-left text-left text-left text-left">${v.auth}</p><div class="bg-slate-50 p-5 rounded-[24px] mb-6 border border-slate-100 text-left text-left text-left text-left text-left"><p class="text-[10px] font-bold text-slate-400 uppercase mb-2 text-left text-left text-left text-left">Motorista Responsável</p><p class="text-lg font-bold text-slate-800 uppercase underline decoration-gold/50 underline-offset-8 text-left text-left text-left text-left text-left text-left">${v.mot}</p><div class="mt-4 text-left text-left"><p class="text-[13px] text-navy font-bold flex items-center gap-3 text-left text-left"><i class="fas fa-car-side"></i> ${v.model}</p><p class="text-[13px] text-navy font-bold mt-1 pl-6.5 uppercase text-left text-left">Placa: ${v.plate}</p></div></div><div class="flex gap-3"><a href="tel:${v.tel.replace(/\D/g,'')}" class="touch-target flex-1 bg-navy text-white text-xs font-bold rounded-2xl shadow-sm"><i class="fas fa-phone-alt mr-2 text-gold"></i> Ligar</a><a href="https://wa.me/55${v.tel.replace(/\D/g,'')}" target="_blank" class="touch-target flex-1 bg-emerald-600 text-white text-xs font-bold rounded-2xl shadow-md"><i class="fab fa-whatsapp mr-2 text-gold"></i> WhatsApp</a></div></div>`;
                });
            }
            body.innerHTML = content;
            m.classList.remove('hidden');
            setTimeout(() => m.classList.add('open'), 10);
        }

        function closeModal() { const m = document.getElementById('info-modal'); m.classList.remove('open'); setTimeout(() => m.classList.add('hidden'), 300); }

        function updateIndicator() {
            document.querySelectorAll('.current-time-indicator').forEach(l => l.remove());
            const activeTab = document.querySelector('.tab-content.active');
            if(!activeTab) return;

            const activeIdx = activeTab.id.split('-')[1];
            const scheduleDate = schedule[activeIdx].date;
            
            const now = new Date();
            const todayStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;

            if (scheduleDate !== todayStr) return;

            const timeNowMinutes = now.getHours() * 60 + now.getMinutes();
            const timeLabel = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            const cards = activeTab.querySelectorAll('.event-card');
            
            let inserted = false;
            const timelineHTML = `
                <div class="current-time-indicator">
                    <span class="time-text">${timeLabel}</span>
                    <div class="time-dot"></div>
                    <div class="time-line"></div>
                </div>`;

            for (let i = 0; i < cards.length; i++) {
                const cardTimeStr = cards[i].getAttribute('data-time');
                const match = cardTimeStr.match(/(\d+)h(\d*)/);
                if (!match) continue;
                
                const cardH = parseInt(match[1]);
                const cardM = parseInt(match[2] || 0);
                const cardMinutes = cardH * 60 + cardM;

                if (cardMinutes > timeNowMinutes) {
                    cards[i].insertAdjacentHTML('beforebegin', timelineHTML);
                    inserted = true;
                    break;
                }
            }

            if (!inserted && cards.length > 0) {
                cards[cards.length - 1].insertAdjacentHTML('afterend', timelineHTML);
            }
        }
        
        window.onload = init;
    </script>
</body>
</html>
